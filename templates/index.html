
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#dcdfe1,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat-container{
    width:420px;
    height:700px;
    background:#c1ebf4;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    display:flex;
    flex-direction:column;
}

.header{
    background:#62b3f4;
    color:white;
    text-align:center;
    padding:18px;
}

.header h2{
    font-size:26px;
}

.header p{
    margin-top:5px;
    font-size:14px;
}

.chat-box{
    flex:1;
    padding:20px;
    background:#e1e9ee;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.bot{
    background:white;
    color:#222;
    padding:12px 15px;
    border-radius:15px;
    max-width:75%;
    margin-bottom:15px;
    align-self:flex-start;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.user{
    background:#c6e2f8;
    color:#222;
    padding:12px 15px;
    border-radius:15px;
    max-width:75%;
    margin-bottom:15px;
    align-self:flex-end;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.input-box{
    display:flex;
    padding:12px;
    background:white;
    border-top:1px solid #ccc;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:25px;
    outline:none;
    font-size:15px;
}

input:focus{
    border:2px solid #0f489d;
}

button{
    margin-left:10px;
    width:90px;
    border:none;
    border-radius:25px;
    background:#0f9d58;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#087f45;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#bbb;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="chat-container">

    <div class="header">
        <h2>🤖 AI Chatbot</h2>
        <p>Machine Learning Chatbot</p>
    </div>

    <div class="chat-box" id="chat-box">

        <div class="bot">
            👋 Hello! Welcome to AI Chatbot.
        </div>

    </div>

    <div class="input-box">

        <input
        type="text"
        id="user-input"
        placeholder="Type your message...">

        <button id="send-btn">
            Send
        </button>

    </div>

</div>

<script>

const sendBtn=document.getElementById("send-btn");
const userInput=document.getElementById("user-input");
const chatBox=document.getElementById("chat-box");

function sendMessage(){

    let message=userInput.value.trim();

    if(message===""){
        return;
    }

    chatBox.innerHTML+=`
        <div class="user">
            ${message}
        </div>
    `;

    fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            message:message
        })

    })

    .then(response=>response.json())

    .then(data=>{

        chatBox.innerHTML+=`

            <div class="bot">

                ${data.response}

            </div>

        `;

        chatBox.scrollTop=chatBox.scrollHeight;

    })

    .catch(error=>{

        chatBox.innerHTML+=`

        <div class="bot">

        Server Error

        </div>

        `;

    });

    userInput.value="";

}

sendBtn.addEventListener("click",sendMessage);

userInput.addEventListener("keypress",function(event){

    if(event.key==="Enter"){

        sendMessage();

    }

});

</script>

</body>
</html>
